baseURL = 'https://Hahahaxu.github.io/hugo_mork_data/'
languageCode = 'zh-cn'
title = 'Hahahaxu Wiki'
theme = 'PaperMod'

[permalinks]
    docs = "/学习资料/hugo/:slugorcontentbasename/"
    "系统架构设计师教程第二版" = "/学习资料/软考/:slugorcontentbasename/"

[params]
    env = "production"
    title = "Hahahaxu's Blog"
    description = "Backend Developer | Go | System Architect"
    # 日历样式: sakura | starry
    updateCalendarStyle = "sakura"

[params.assets]
    favicon = "favicon.svg"
    favicon16x16 = "favicon.svg"
    favicon32x32 = "favicon.svg"
    apple_touch_icon = "favicon.svg"
    safari_pinned_tab = "favicon.svg"

[params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 100
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

[[menu.main]]
    identifier = "learning"
    name = "学习资料"
    url = "/学习资料/"
    weight = 5

[[menu.main]]
    identifier = "learning-hugo"
    parent = "learning"
    name = "Hugo"
    url = "/学习资料/hugo/"
    weight = 1

[[menu.main]]
    identifier = "learning-ruankao"
    parent = "learning"
    name = "软考"
