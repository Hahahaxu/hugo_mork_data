name: Deploy Hugo Site
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 解决你日志里的 Node.js 20 弃用警告
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive  # 强制递归拉取子模块
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build
        # 增加 --verbose 可以在失败时看到详细报错
        run: hugo --minify --verbose

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public